<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARZ Contacts Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ff88">
<style>
:root{
    --green:#00ff88;
    --bg:#0a0a0a;
    --card:#121212;
}
body{
    background:var(--bg);
    color:#fff;
    font-family:Segoe UI;
    margin:0;
}
.container{
    max-width:450px;
    margin:auto;
    padding:20px;
}
h2{text-align:center;color:var(--green);}
.card{
    background:var(--card);
    padding:15px;
    border-radius:12px;
    margin:10px 0;
    box-shadow:0 0 10px #000;
}
input,select,button{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:8px;
    border:none;
}
input,select{background:#1a1a1a;color:#0f0;}
button{background:var(--green);color:#000;font-weight:bold;cursor:pointer;}
.small-btn{padding:6px;font-size:0.7rem;}
.table{width:100%;font-size:0.85rem;}
.table td{padding:6px;border-bottom:1px solid #222;}
.flex{display:flex;gap:10px;}
.stat{flex:1;text-align:center;background:#111;padding:10px;border-radius:10px;}
.hidden{display:none;}
a{color:var(--green);}
</style>
</head>
<body>

<div class="container">

<!-- REGISTER / LOGIN -->
<div id="authBox">
  <h2>📝 Register / Login</h2>
  <div class="card">
    <input type="text" id="regUsername" placeholder="Username">
    <input type="email" id="regEmail" placeholder="Email">
    <label for="countryCode">Country Code:</label>
    <select id="countryCode">
      <option value="+254">+254 (Kenya)</option>
      <option value="+255">+255 (Tanzania)</option>
      <option value="+256">+256 (Uganda)</option>
      <option value="+257">+257 (Burundi)</option>
      <option value="+258">+258 (Mozambique)</option>
      <option value="+260">+260 (Zambia)</option>
      <option value="+263">+263 (Zimbabwe)</option>
      <option value="+27">+27 (South Africa)</option>
      <option value="+1">+1 (USA)</option>
      <option value="+44">+44 (UK)</option>
      <option value="+33">+33 (France)</option>
      <option value="+91">+91 (India)</option>
    </select>
    <input type="text" id="regPhone" placeholder="Phone Number">
    <input type="password" id="regPassword" placeholder="Password">
    <input type="password" id="regConfirmPassword" placeholder="Confirm Password">
    <button onclick="registerUser()">Register</button>
    <p style="font-size:0.85rem; text-align:center; margin-top:10px;">
      Already have an account? <a href="#" onclick="showLogin()">Login here</a>
    </p>
    <hr style="border:1px solid #222;">
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="loginUser()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="appBox" class="hidden">

<div class="card">
  <div class="flex">
    <div class="stat">
      <p>Total</p>
      <b id="total">0</b>
    </div>
    <div class="stat">
      <p>Growth</p>
      <b id="growth">0%</b>
    </div>
  </div>
</div>

<div class="card">
  <input id="search" placeholder="🔍 Search..." oninput="searchMember()">
</div>

<div class="card">
  <input id="name" placeholder="Full Name">
  <input id="phone" placeholder="Phone">
  <button onclick="addMember()">➕ Add Member</button>
</div>

<div class="card">
  <input type="file" id="csv">
  <button onclick="importCSV()">📲 Import CSV</button>
  <button onclick="saveCloud()">☁️ Save</button>
  <button onclick="loadCloud()">📥 Load</button>
  <button onclick="downloadVCF()">📇 Export VCF</button>
  <button onclick="logout()">🚪 Logout</button>
</div>

<div class="card">
  <table class="table">
    <tbody id="list"></tbody>
  </table>
</div>

</div>
</div>

<!-- FIREBASE + APP LOGIC -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCdklJwcCh2_9hnXjKarmcYeF6xAQ7dnuI",
  authDomain: "arz-software.firebaseapp.com",
  projectId: "arz-software",
  storageBucket: "arz-software.firebasestorage.app",
  messagingSenderId: "397454140696",
  appId: "1:397454140696:web:f8bb180f858c66aac22a6d"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const authBox = document.getElementById("authBox");
const appBox = document.getElementById("appBox");
const regUsername = document.getElementById("regUsername");
const regEmail = document.getElementById("regEmail");
const countryCode = document.getElementById("countryCode");
const regPhone = document.getElementById("regPhone");
const regPassword = document.getElementById("regPassword");
const regConfirmPassword = document.getElementById("regConfirmPassword");
const loginEmail = document.getElementById("loginEmail");
const loginPassword = document.getElementById("loginPassword");

const nameEl = document.getElementById("name");
const phoneEl = document.getElementById("phone");
const totalEl = document.getElementById("total");
const growthEl = document.getElementById("growth");
const listEl = document.getElementById("list");
const searchEl = document.getElementById("search");
const csvEl = document.getElementById("csv");

let members = JSON.parse(localStorage.getItem("members")) || [];
let filtered = [...members];

onAuthStateChanged(auth,user=>{
  if(user){
    authBox.classList.add("hidden");
    appBox.classList.remove("hidden");
    loadCloud();
  } else {
    authBox.classList.remove("hidden");
    appBox.classList.add("hidden");
  }
});

window.showLogin = ()=>{alert("Use login section below");};

window.registerUser = async()=>{
  const username = regUsername.value.trim();
  const email = regEmail.value.trim();
  const code = countryCode.value;
  const phone = regPhone.value.trim();
  const password = regPassword.value;
  const confirm = regConfirmPassword.value;

  if(!username||!email||!phone||!password||!confirm) return alert("⚠️ Fill all fields");
  if(password!==confirm) return alert("❌ Passwords do not match");

  try{
    await createUserWithEmailAndPassword(auth,email,password);
    alert(`✅ Registered: ${username} (${code}${phone})`);
  }catch(e){alert(e.message);}
};

window.loginUser = async()=>{
  const email = loginEmail.value.trim();
  const password = loginPassword.value;
  try{
    await signInWithEmailAndPassword(auth,email,password);
    alert("✅ Logged in");
  }catch(e){alert(e.message);}
};

window.logout = async()=>{await signOut(auth); alert("✅ Logged out");};

const refresh = ()=>{
  localStorage.setItem("members",JSON.stringify(members));
  totalEl.innerText=members.length;
  const prev=localStorage.getItem("prev")||0;
  const g = prev? ((members.length-prev)/prev*100).toFixed(1):0;
  growthEl.innerText = g+"%";
  localStorage.setItem("prev",members.length);
  render();
};

const render = ()=>{
  let html="";
  filtered.forEach((m,i)=>{
    html+=`<tr>
      <td>${m.name}</td>
      <td>${m.phone}</td>
      <td><button class="small-btn" onclick="del(${i})">✖</button></td>
    </tr>`;
  });
  listEl.innerHTML=html;
};

window.addMember = ()=>{
  const n=nameEl.value.trim();
  const p=phoneEl.value.trim();
  if(!n||!p) return alert("Fill all fields");
  members.push({name:n,phone:p});
  filtered=[...members];
  refresh();
  nameEl.value=""; phoneEl.value="";
};

window.del = (i)=>{members.splice(i,1);filtered=[...members];refresh();};
window.searchMember = ()=>{const q=searchEl.value.toLowerCase();filtered=members.filter(m=>m.name.toLowerCase().includes(q)||m.phone.includes(q));render();};
window.importCSV = ()=>{
  const file = csvEl.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload=e=>{
    e.target.result.split("\n").forEach(r=>{
      const [n,p]=r.split(",");
      if(n&&p) members.push({name:n.trim(),phone:p.trim()});
    });
    filtered=[...members]; refresh();
  };
  reader.readAsText(file);
};
window.saveCloud = async()=>{
  const user = auth.currentUser;
  if(!user) return alert("⚠️ Login first");
  await setDoc(doc(db,"contacts",user.uid),{members});
  alert("☁️ Saved to cloud");
};
window.loadCloud = async()=>{
  const user = auth.currentUser;
  if(!user) return;
  const snap = await getDoc(doc(db,"contacts",user.uid));
  if(snap.exists()){members=snap.data().members||[];filtered=[...members];refresh();}
};
window.downloadVCF = ()=>{
  if(members.length===0) return alert("No members to export");
  let vcf="";
  members.forEach(m=>{vcf+=`BEGIN:VCARD\nVERSION:3.0\nFN:${m.name}\nTEL:${m.phone}\nEND:VCARD\n`;});
  const blob=new Blob([vcf],{type:"text/vcard"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="contacts.vcf";
  a.click();
};
refresh();
</script>

<!-- REGISTER SERVICE WORKER -->
<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js")
  .then(reg=>console.log("Service Worker registered:",reg))
  .catch(err=>console.log("SW registration failed:",err));
}
</script>

</body>
</html>
